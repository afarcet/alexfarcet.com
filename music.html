<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlotMusic — Alex Farcet</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=DM+Sans:wght@400;500&family=Russo+One&family=Bungee+Shade&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0a0a12;
  color:#e0d8c8;
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* === NEON GLOW BACKGROUND === */
body::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:
    radial-gradient(ellipse at 30% 20%,rgba(255,0,100,0.08) 0%,transparent 50%),
    radial-gradient(ellipse at 70% 80%,rgba(0,200,255,0.06) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 50%,rgba(120,0,255,0.04) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;opacity:0.5;
}

/* Floating particles */
.dust{position:fixed;border-radius:50%;pointer-events:none;z-index:1}
.dust:nth-child(1){width:4px;height:4px;top:15%;left:20%;background:rgba(255,0,150,0.3);animation:drift1 18s infinite linear}
.dust:nth-child(2){width:3px;height:3px;top:45%;left:70%;background:rgba(0,200,255,0.3);animation:drift2 22s infinite linear}
.dust:nth-child(3){width:5px;height:5px;top:70%;left:40%;background:rgba(255,200,0,0.2);animation:drift1 15s infinite linear reverse}
.dust:nth-child(4){width:3px;height:3px;top:25%;left:80%;background:rgba(0,255,150,0.2);animation:drift2 20s infinite linear reverse}
.dust:nth-child(5){width:4px;height:4px;top:60%;left:15%;background:rgba(255,0,200,0.25);animation:drift1 25s infinite linear}
@keyframes drift1{0%{transform:translate(0,0) scale(1);opacity:0.2}50%{transform:translate(60px,-40px) scale(2);opacity:0.6}100%{transform:translate(-20px,30px) scale(0.8);opacity:0.2}}
@keyframes drift2{0%{transform:translate(0,0);opacity:0.15}50%{transform:translate(-50px,60px);opacity:0.5}100%{transform:translate(30px,-20px);opacity:0.15}}

/* === LAYOUT === */
.page-wrap{max-width:900px;margin:0 auto;padding:24px 24px 60px;position:relative;z-index:2}
nav.side-nav{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
nav.side-nav .nav-link{color:#665e4a;font-size:0.75rem;text-decoration:none;transition:color 0.3s}
nav.side-nav .nav-link:hover{color:#ff69b4}
nav.side-nav .nav-link-active{color:#ff69b4}
.top-header{margin-bottom:32px}
.top-header a{display:flex;align-items:center;gap:12px;text-decoration:none;color:#e0d8c8}
.top-header .logo-small{width:36px;height:36px;object-fit:contain;border-radius:50%;filter:saturate(1.3)}
.top-header .site-title{font-family:'Special Elite',serif;font-size:1.1rem;letter-spacing:0.05em}

/* === TAGLINE === */
.tagline{
  font-family:'Permanent Marker',cursive;
  font-size:1.8rem;
  text-align:center;
  margin-bottom:36px;
  line-height:1.4;
  color:#fff;
  text-shadow:0 0 30px rgba(255,0,150,0.4),0 0 60px rgba(255,0,150,0.2);
}
.tagline .no{
  color:#ff1744;
  text-decoration:line-through;
  text-decoration-color:#ff1744;
  text-decoration-thickness:3px;
}
.tagline .yes{
  color:#00e5ff;
  font-style:italic;
  text-shadow:0 0 20px rgba(0,229,255,0.6),0 0 40px rgba(0,229,255,0.3);
}

/* ============================
   THE MACHINE
   ============================ */
.cabinet{
  position:relative;
  max-width:700px;
  margin:0 auto 32px;
}

.machine{
  position:relative;
  background:linear-gradient(180deg,#1a1028 0%,#12101e 50%,#0e0c18 100%);
  border-radius:20px 20px 16px 16px;
  border:3px solid;
  border-image:linear-gradient(180deg,#ff69b4,#8b00ff 50%,#00e5ff) 1;
  box-shadow:
    0 0 40px rgba(255,0,150,0.15),
    0 0 80px rgba(139,0,255,0.1),
    0 30px 80px rgba(0,0,0,0.7),
    inset 0 1px 0 rgba(255,255,255,0.05);
  overflow:visible;
}

/* === MARQUEE === */
.marquee{
  position:relative;
  background:linear-gradient(180deg,#1e0830 0%,#120020 100%);
  padding:24px 20px 18px;
  text-align:center;
  border-bottom:2px solid rgba(255,105,180,0.3);
  overflow:hidden;
}
/* Animated neon border at top */
.marquee::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#ff1744,#ff69b4,#e040fb,#7c4dff,#00e5ff,#00e676,#ffea00,#ff1744);
  background-size:200% 100%;
  animation:rainbowSlide 4s linear infinite;
}
@keyframes rainbowSlide{0%{background-position:0% 0}100%{background-position:200% 0}}

.marquee-title{
  font-family:'Bungee Shade',cursive;
  font-size:2.2rem;
  letter-spacing:0.08em;
  color:#ff69b4;
  text-shadow:
    0 0 10px rgba(255,105,180,0.8),
    0 0 30px rgba(255,105,180,0.5),
    0 0 60px rgba(255,105,180,0.3),
    0 0 100px rgba(255,0,150,0.2),
    3px 3px 0 rgba(0,229,255,0.3);
  position:relative;z-index:2;
}
.marquee-sub{
  font-family:'Permanent Marker',cursive;
  font-size:0.7rem;
  color:#00e5ff;
  letter-spacing:0.2em;
  text-transform:uppercase;
  margin-top:6px;
  text-shadow:0 0 10px rgba(0,229,255,0.5);
  position:relative;z-index:2;
}

/* Chaser lights */
.chasers{
  display:flex;justify-content:center;gap:18px;
  margin-top:10px;position:relative;z-index:2;
}
.chaser{
  width:8px;height:8px;border-radius:50%;
  animation:chase 1.5s infinite;
}
.chaser:nth-child(1){background:#ff1744;box-shadow:0 0 8px #ff1744,0 0 16px #ff1744;animation-delay:0s}
.chaser:nth-child(2){background:#ff69b4;box-shadow:0 0 8px #ff69b4,0 0 16px #ff69b4;animation-delay:0.1s}
.chaser:nth-child(3){background:#e040fb;box-shadow:0 0 8px #e040fb,0 0 16px #e040fb;animation-delay:0.2s}
.chaser:nth-child(4){background:#7c4dff;box-shadow:0 0 8px #7c4dff,0 0 16px #7c4dff;animation-delay:0.3s}
.chaser:nth-child(5){background:#00e5ff;box-shadow:0 0 8px #00e5ff,0 0 16px #00e5ff;animation-delay:0.4s}
.chaser:nth-child(6){background:#00e676;box-shadow:0 0 8px #00e676,0 0 16px #00e676;animation-delay:0.5s}
.chaser:nth-child(7){background:#ffea00;box-shadow:0 0 8px #ffea00,0 0 16px #ffea00;animation-delay:0.6s}
.chaser:nth-child(8){background:#ff9100;box-shadow:0 0 8px #ff9100,0 0 16px #ff9100;animation-delay:0.7s}
.chaser:nth-child(9){background:#ff1744;box-shadow:0 0 8px #ff1744,0 0 16px #ff1744;animation-delay:0.8s}
@keyframes chase{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.3)}}

/* === REEL AREA === */
.reel-area{
  padding:24px 20px 16px;
  position:relative;z-index:2;
}
.reel-labels{
  display:flex;gap:8px;justify-content:center;margin-bottom:8px;
}
.reel-label{
  flex:1;max-width:160px;text-align:center;
  font-family:'Permanent Marker',cursive;font-size:0.7rem;
  text-transform:uppercase;letter-spacing:0.15em;
  color:#00e5ff;
  text-shadow:0 0 8px rgba(0,229,255,0.4);
}

/* Reel viewport */
.reel-viewport{
  background:#030208;
  border:3px solid;
  border-image:linear-gradient(180deg,#ff69b4 0%,#7c4dff 50%,#00e5ff 100%) 1;
  border-radius:0;
  padding:0;
  display:flex;
  box-shadow:
    inset 0 0 40px rgba(0,0,0,0.9),
    0 0 20px rgba(139,0,255,0.2),
    0 2px 0 rgba(255,255,255,0.03);
  position:relative;
  overflow:hidden;
}
/* Scan line effect */
.reel-viewport::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);
  pointer-events:none;z-index:3;
}

.reel-window{
  flex:1;
  height:90px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  border-right:1px solid rgba(139,0,255,0.3);
}
.reel-window:last-child{border-right:none}
/* Glow at top/bottom */
.reel-window::before,.reel-window::after{
  content:'';position:absolute;left:0;right:0;height:25px;z-index:2;pointer-events:none;
}
.reel-window::before{top:0;background:linear-gradient(to bottom,rgba(3,2,8,0.9),transparent)}
.reel-window::after{bottom:0;background:linear-gradient(to top,rgba(3,2,8,0.9),transparent)}

.reel-val{
  font-family:'Russo One',sans-serif;
  font-size:1.15rem;
  color:#00ff88;
  text-shadow:0 0 10px rgba(0,255,136,0.7),0 0 20px rgba(0,255,136,0.4),0 0 40px rgba(0,255,136,0.2);
  transition:none;
  position:relative;z-index:1;
  text-transform:uppercase;
  letter-spacing:0.05em;
}
.reel-window.spin .reel-val{animation:reelBlur 0.1s infinite;color:rgba(0,255,136,0.5)}
.reel-window.land .reel-val{animation:reelLand 0.35s ease-out;color:#00ff88}
@keyframes reelBlur{0%{transform:translateY(-12px);opacity:0.2}50%{transform:translateY(0);opacity:0.6}100%{transform:translateY(12px);opacity:0.2}}
@keyframes reelLand{0%{transform:translateY(-10px) scale(1.2);text-shadow:0 0 30px rgba(0,255,136,1)}60%{transform:translateY(3px) scale(0.95)}100%{transform:translateY(0) scale(1)}}

/* Payline arrows */
.payline{
  position:absolute;top:50%;transform:translateY(-50%);
  width:0;height:0;z-index:5;
}
.payline-l{left:2px;border-top:8px solid transparent;border-bottom:8px solid transparent;border-left:10px solid #ff1744;filter:drop-shadow(0 0 4px #ff1744)}
.payline-r{right:2px;border-top:8px solid transparent;border-bottom:8px solid transparent;border-right:10px solid #ff1744;filter:drop-shadow(0 0 4px #ff1744)}

/* === CONTROLS === */
.controls{
  padding:16px 20px 20px;
  display:flex;align-items:center;justify-content:center;gap:20px;
  position:relative;z-index:2;
}
.spin-btn{
  background:linear-gradient(180deg,#ff1744 0%,#d50000 50%,#b71c1c 100%);
  border:3px solid #ff5252;
  color:#fff;
  font-family:'Russo One',sans-serif;
  font-size:1rem;
  letter-spacing:0.2em;
  text-transform:uppercase;
  padding:14px 48px;
  border-radius:50px;
  cursor:pointer;
  box-shadow:
    0 0 20px rgba(255,23,68,0.4),
    0 0 40px rgba(255,23,68,0.2),
    0 4px 12px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.3),
    inset 0 -2px 0 rgba(0,0,0,0.2);
  transition:all 0.15s;
  text-shadow:0 2px 4px rgba(0,0,0,0.5);
}
.spin-btn:hover{
  background:linear-gradient(180deg,#ff5252 0%,#ff1744 50%,#d50000 100%);
  box-shadow:0 0 30px rgba(255,23,68,0.6),0 0 60px rgba(255,23,68,0.3),0 4px 16px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.3);
  transform:scale(1.03);
}
.spin-btn:active{
  transform:scale(0.97) translateY(2px);
  box-shadow:0 0 15px rgba(255,23,68,0.3),0 2px 6px rgba(0,0,0,0.5),inset 0 2px 4px rgba(0,0,0,0.4);
}
.counter{
  font-family:'Permanent Marker',cursive;font-size:0.7rem;
  color:#7c4dff;letter-spacing:0.05em;
  text-shadow:0 0 8px rgba(124,77,255,0.4);
}
.counter span{color:#e040fb;text-shadow:0 0 8px rgba(224,64,251,0.5)}

/* Machine footer */
.machine-foot{
  background:linear-gradient(180deg,#0e0c18,#08060f);
  padding:8px 20px;
  border-top:1px solid rgba(255,105,180,0.15);
  display:flex;justify-content:space-between;
}
.machine-foot span{
  font-family:'Special Elite',serif;font-size:0.55rem;
  color:#3d2860;letter-spacing:0.1em;
}

/* ============================
   LEVER ARM
   ============================ */
.lever-arm{
  position:absolute;
  right:-65px;
  top:80px;
  width:60px;
  height:280px;
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  z-index:20;
  -webkit-user-select:none;user-select:none;
}

/* Chrome rod via SVG */
.lever-rod{
  width:16px;
  flex:1;
  background:linear-gradient(90deg,#888 0%,#ccc 25%,#fff 45%,#ddd 55%,#aaa 75%,#777 100%);
  border-radius:8px;
  position:relative;
  box-shadow:2px 4px 12px rgba(0,0,0,0.6);
}

/* Big red ball */
.lever-ball{
  width:56px;height:56px;
  background:radial-gradient(circle at 35% 28%,#ff6666,#ff1744 30%,#d50000 55%,#8b0000 80%,#4a0000);
  border:3px solid #ff5252;
  border-radius:50%;
  cursor:grab;
  position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  box-shadow:
    0 0 20px rgba(255,23,68,0.5),
    0 0 40px rgba(255,23,68,0.25),
    0 6px 20px rgba(0,0,0,0.6),
    inset 0 3px 0 rgba(255,255,255,0.25),
    inset 0 -3px 6px rgba(0,0,0,0.3);
  transition:top 0.15s ease-in;
  z-index:10;
}
/* Shine */
.lever-ball::before{
  content:'';position:absolute;top:7px;left:12px;
  width:18px;height:14px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(255,255,255,0.45),transparent 70%);
}
.lever-ball:hover{
  box-shadow:0 0 30px rgba(255,23,68,0.7),0 0 60px rgba(255,23,68,0.35),0 6px 24px rgba(0,0,0,0.6),inset 0 3px 0 rgba(255,255,255,0.25);
  border-color:#ff8a80;
}
.lever-ball:active{cursor:grabbing}
.lever-ball.pulled{top:calc(100% - 56px);transition:top 0.3s ease-in}
.lever-ball.released{top:0;transition:top 0.5s cubic-bezier(0.175,0.885,0.32,1.275)}

/* Chrome mount */
.lever-mount{
  width:30px;height:18px;
  background:linear-gradient(90deg,#888,#ccc 30%,#fff 50%,#ccc 70%,#888);
  border-radius:4px 4px 10px 10px;
  margin-top:-2px;
  box-shadow:0 4px 8px rgba(0,0,0,0.4);
}
.lever-hint{
  font-family:'Permanent Marker',cursive;font-size:0.6rem;
  color:#ff1744;text-align:center;margin-top:8px;
  text-shadow:0 0 8px rgba(255,23,68,0.5);
  animation:hintPulse 2s infinite;
}
@keyframes hintPulse{0%,100%{opacity:0.3}50%{opacity:1}}

/* ============================
   RESULT
   ============================ */
.result{
  max-width:700px;margin:0 auto 40px;
  opacity:0;transform:translateY(20px) scale(0.97);
  transition:opacity 0.5s ease,transform 0.5s ease;
  pointer-events:none;
}
.result.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.result-card{
  background:linear-gradient(145deg,#1a1028,#12101e);
  border:2px solid rgba(139,0,255,0.3);
  border-radius:14px;
  padding:24px;
  box-shadow:0 0 30px rgba(139,0,255,0.1),0 12px 40px rgba(0,0,0,0.5);
}
.result-top{display:flex;gap:20px;align-items:center}
.result-art{
  width:100px;height:100px;min-width:100px;
  border-radius:10px;overflow:hidden;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  position:relative;
}
.result-art-bg{width:100%;height:100%}
.result-art::after{
  content:'';position:absolute;top:50%;left:50%;
  width:50px;height:50px;border-radius:50%;
  transform:translate(-50%,-50%);
  border:2px solid rgba(255,255,255,0.08);
  box-shadow:0 0 0 8px rgba(255,255,255,0.03),0 0 0 16px rgba(255,255,255,0.015);
}
.result-info{flex:1;min-width:0}
.result-song{
  font-family:'Permanent Marker',cursive;font-size:1.2rem;
  color:#fff;margin-bottom:4px;line-height:1.3;
  text-shadow:0 0 10px rgba(255,105,180,0.3);
}
.result-artist{font-size:0.85rem;color:#e040fb;margin-bottom:2px;text-shadow:0 0 8px rgba(224,64,251,0.3)}
.result-album{font-size:0.75rem;color:#7c4dff;font-style:italic;margin-bottom:14px}
.result-links{display:flex;gap:8px;flex-wrap:wrap}
.result-links a{
  display:inline-flex;align-items:center;gap:5px;
  font-size:0.7rem;color:#888;text-decoration:none;
  padding:5px 12px;border:1px solid rgba(139,0,255,0.3);border-radius:16px;
  transition:all 0.2s;
}
.result-links a:hover{color:#00e5ff;border-color:#00e5ff;background:rgba(0,229,255,0.05);box-shadow:0 0 10px rgba(0,229,255,0.15)}
.result-links svg{width:13px;height:13px;fill:currentColor}
.result-again{text-align:center;margin-top:16px}
.result-again button{
  background:none;border:1px dashed rgba(255,105,180,0.3);color:#ff69b4;
  font-family:'Permanent Marker',cursive;font-size:0.8rem;
  padding:8px 24px;border-radius:20px;cursor:pointer;
  transition:all 0.2s;text-shadow:0 0 8px rgba(255,105,180,0.3);
}
.result-again button:hover{border-color:#ff69b4;box-shadow:0 0 15px rgba(255,105,180,0.2)}

/* === COLLECTION === */
.collection{max-width:700px;margin:0 auto 60px}
.coll-toggle{
  background:none;border:none;color:#7c4dff;
  font-family:'Permanent Marker',cursive;font-size:0.85rem;
  cursor:pointer;padding:8px 0;width:100%;text-align:left;
  transition:color 0.2s;text-shadow:0 0 8px rgba(124,77,255,0.3);
}
.coll-toggle:hover{color:#e040fb}
.coll-toggle .arr{display:inline-block;transition:transform 0.3s;margin-right:8px;font-size:0.7rem}
.coll-toggle.open .arr{transform:rotate(90deg)}
.coll-body{max-height:0;overflow:hidden;transition:max-height 0.5s ease}
.coll-body.open{max-height:8000px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin:16px 0}
.pill{
  background:none;border:1px solid rgba(139,0,255,0.3);color:#7c4dff;
  font-size:0.7rem;padding:4px 12px;border-radius:12px;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all 0.2s;
}
.pill:hover,.pill.on{color:#e040fb;border-color:#e040fb;box-shadow:0 0 8px rgba(224,64,251,0.2)}
.coll-item{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:8px 0;border-bottom:1px solid rgba(139,0,255,0.08);font-size:0.8rem;
}
.coll-item-song{color:#bbb}
.coll-item-artist{color:#7c4dff;font-size:0.75rem;text-align:right;min-width:100px}

/* === FOOTER === */
.page-footer{
  text-align:center;padding-top:24px;
  border-top:1px solid rgba(139,0,255,0.1);max-width:700px;margin:0 auto;
}
.page-footer p{font-size:0.7rem;color:#3d2860;margin-bottom:4px}
.page-footer p:first-child{font-family:'Permanent Marker',cursive;font-size:0.8rem;color:#7c4dff;text-shadow:0 0 8px rgba(124,77,255,0.3)}

/* === MOBILE === */
@media(max-width:650px){
  .tagline{font-size:1.3rem}
  .cabinet{max-width:100%}
  .lever-arm{right:-50px;width:44px;top:70px;height:220px}
  .lever-ball{width:42px;height:42px}
  .lever-ball.pulled{top:calc(100% - 42px)}
  .lever-rod{width:12px}
  .marquee-title{font-size:1.4rem}
  .reel-window{height:70px}
  .reel-val{font-size:0.9rem}
  .controls{gap:12px}
  .spin-btn{padding:12px 32px;font-size:0.85rem}
  .result-top{flex-direction:column;text-align:center}
  .result-art{width:80px;height:80px;min-width:80px}
  .result-links{justify-content:center}
}
@media(max-width:450px){
  .lever-arm{right:-40px;width:36px;height:180px;top:60px}
  .lever-ball{width:34px;height:34px}
  .lever-ball.pulled{top:calc(100% - 34px)}

    {s:"Listen Love (Dave Lee Flute Reboot)",al:"Listen Love",ar:"The Sunburst Band",v:"Groove",r:"Soul & Funk",t:"Melodic"},

    {s:"Mr. Funky Samba",al:"Maria Fumaca",ar:"Banda Black Rio",v:"Fire",r:"Brazilian",t:"Rhythmic"},
    {s:"Heaven Bound",al:"Masterjam",ar:"Rufus & Chaka Khan",v:"Fire",r:"Soul & Funk",t:"Rhythmic"},

    {s:"NOISE OF YOU",al:"Mercy",ar:"John Cale",v:"Chill",r:"Rock & Alt",t:"Atmospheric"}
  ];

  var V=["Chill","Groove","Fire"];
  var R=["Jazz","Brazilian","Electronic","Soul & Funk","Hip Hop","Latin","Rock & Alt"];
  var T=["Melodic","Rhythmic","Atmospheric"];
  var GC={
    "Jazz":"#0a2040,#061530,#00e5ff",
    "Brazilian":"#2a1e00,#1a1200,#ffea00",
    "Electronic":"#1a0040,#0a0020,#e040fb",
    "Soul & Funk":"#301000,#200a00,#ff9100",
    "Hip Hop":"#200020,#100010,#ff1744",
    "Latin":"#2a1500,#1a0800,#ff6d00",
    "Rock & Alt":"#0a0a20,#050515,#7c4dff"
  };

  var lever=document.getElementById("lever");
  var r1=document.getElementById("r1");
  var r2=document.getElementById("r2");
  var r3=document.getElementById("r3");
  var result=document.getElementById("result");
  var again=document.getElementById("again");
  var spinBtn=document.getElementById("spinBtn");
  var ctog=document.getElementById("ctog");
  var cbody=document.getElementById("cbody");
  var spinsEl=document.getElementById("spins");
  var busy=false;
  var spinCount=0;

  function spin(){
    if(busy)return;
    busy=true;
    spinCount++;
    spinsEl.textContent=spinCount;
    result.classList.remove("show");

    lever.classList.remove("released");
    lever.classList.add("pulled");

    r1.classList.add("spin");r1.classList.remove("land");
    r2.classList.add("spin");r2.classList.remove("land");
    r3.classList.add("spin");r3.classList.remove("land");

    var i1=setInterval(function(){r1.querySelector(".reel-val").textContent=V[Math.floor(Math.random()*V.length)]},80);
    var i2=setInterval(function(){r2.querySelector(".reel-val").textContent=R[Math.floor(Math.random()*R.length)]},90);
    var i3=setInterval(function(){r3.querySelector(".reel-val").textContent=T[Math.floor(Math.random()*T.length)]},100);

    var fv=V[Math.floor(Math.random()*V.length)];
    var fr=R[Math.floor(Math.random()*R.length)];
    var ft=T[Math.floor(Math.random()*T.length)];

    setTimeout(function(){lever.classList.remove("pulled");lever.classList.add("released")},600);
    setTimeout(function(){clearInterval(i1);r1.classList.remove("spin");r1.classList.add("land");r1.querySelector(".reel-val").textContent=fv},1400);
    setTimeout(function(){clearInterval(i2);r2.classList.remove("spin");r2.classList.add("land");r2.querySelector(".reel-val").textContent=fr},2000);
    setTimeout(function(){clearInterval(i3);r3.classList.remove("spin");r3.classList.add("land");r3.querySelector(".reel-val").textContent=ft},2600);
    setTimeout(function(){var song=find(fv,fr,ft);showSong(song);busy=false},3000);
  }

  function find(v,r,t){
    var m=S.filter(function(x){return x.v===v&&x.r===r&&x.t===t});
    if(m.length)return m[Math.floor(Math.random()*m.length)];
    m=S.filter(function(x){return x.v===v&&x.r===r});
    if(m.length)return m[Math.floor(Math.random()*m.length)];
    m=S.filter(function(x){return x.v===v});
    if(m.length)return m[Math.floor(Math.random()*m.length)];
    return S[Math.floor(Math.random()*S.length)];
  }

  function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}
  function enc(s){return encodeURIComponent(s)}

  function showSong(song){
    document.getElementById("rs").textContent=song.s;
    document.getElementById("ra").textContent=song.ar;
    document.getElementById("ral").textContent=song.al;

    var gc=(GC[song.r]||"#0a0a20,#050515,#888").split(",");
    var ang=Math.floor(Math.random()*360);
    document.getElementById("art").style.background="linear-gradient("+ang+"deg,"+gc[0]+","+gc[1]+")";

    var q=enc(song.ar+" "+song.s);
    var rl=document.getElementById("rl");
    rl.innerHTML='<a href="https://open.spotify.com/search/'+q+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg> Spotify</a>'
    +'<a href="https://www.youtube.com/results?search_query='+q+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg> YouTube</a>'
    +'<a href="https://music.apple.com/us/search?term='+q+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M23.994 18.066a8.4 8.4 0 01-.925 2.03c-.56.82-1.02 1.39-1.37 1.71-.55.52-1.14.79-1.77.8-.45 0-1-.13-1.64-.39-.64-.26-1.22-.39-1.76-.39-.56 0-1.16.13-1.8.39-.64.26-1.16.4-1.56.4-.6.02-1.2-.16-1.8-.55a12.3 12.3 0 01-1.95-2.16 14 14 0 01-1.3-2.22 12.7 12.7 0 01-.86-3.09c0-1.14.25-2.12.74-2.95a4.3 4.3 0 013.64-2.17c.48 0 1.11.15 1.9.45.78.3 1.28.45 1.5.45.16 0 .72-.18 1.67-.52.9-.32 1.65-.46 2.27-.4 1.68.13 2.94.8 3.78 1.99-1.5.91-2.24 2.19-2.23 3.82.01 1.27.47 2.33 1.38 3.17.41.39.87.69 1.38.9-.11.32-.23.63-.35.93zM18.09.3c0 1-.36 1.93-1.09 2.78-.87 1.02-1.93 1.61-3.07 1.52a3 3 0 01-.02-.38c0-.96.42-1.98 1.16-2.82A4.5 4.5 0 0118.07 0c.01.1.02.2.02.3z"/></svg> Apple</a>';

    result.classList.add("show");
  }

  // Events
  var leverZone=document.getElementById("leverZone");
  leverZone.addEventListener("click",function(e){e.preventDefault();spin()});
  spinBtn.addEventListener("click",spin);

  var dragging=false;var dragStartY=0;
  lever.addEventListener("mousedown",function(e){if(busy)return;dragging=true;dragStartY=e.clientY;e.preventDefault()});
  document.addEventListener("mousemove",function(e){if(!dragging)return;if(e.clientY-dragStartY>30){dragging=false;spin()}});
  document.addEventListener("mouseup",function(){dragging=false});
  lever.addEventListener("touchstart",function(e){if(busy)return;dragging=true;dragStartY=e.touches[0].clientY;e.preventDefault()},{passive:false});
  document.addEventListener("touchmove",function(e){if(!dragging)return;if(e.touches[0].clientY-dragStartY>30){dragging=false;spin()}});
  document.addEventListener("touchend",function(){dragging=false});

  again.addEventListener("click",spin);

  var built=false;
  ctog.addEventListener("click",function(){
    var open=cbody.classList.contains("open");
    if(open){cbody.classList.remove("open");ctog.classList.remove("open")}
    else{cbody.classList.add("open");ctog.classList.add("open");if(!built){buildColl();built=true}}
  });

  function buildColl(){
    var pills=document.getElementById("pills");
    var all=["All"].concat(R);
    all.forEach(function(g){
      var b=document.createElement("button");
      b.className="pill"+(g==="All"?" on":"");
      b.textContent=g;
      b.addEventListener("click",function(){
        var ps=pills.querySelectorAll(".pill");
        for(var i=0;i<ps.length;i++)ps[i].classList.remove("on");
        b.classList.add("on");
        renderColl(g==="All"?null:g);
      });
      pills.appendChild(b);
    });
    renderColl(null);
  }

  function renderColl(filter){
    var list=document.getElementById("clist");
    list.innerHTML="";
    var sorted=S.slice().sort(function(a,b){return a.ar.localeCompare(b.ar)});
    if(filter)sorted=sorted.filter(function(x){return x.r===filter});
    sorted.forEach(function(x){
      var d=document.createElement("div");
      d.className="coll-item";
      d.innerHTML='<span class="coll-item-song">'+esc(x.s)+'</span><span class="coll-item-artist">'+esc(x.ar)+'</span>';
      list.appendChild(d);
    });
  }
})();
</script>
