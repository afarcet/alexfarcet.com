<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlotMusic — Alex Farcet</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* === GRUNGY BASEMENT === */
body{
  background:#1a1611;
  color:#d4c9a8;
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}
/* Film grain overlay */
body::after{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;opacity:0.4;
}
/* Dust motes */
.dust{position:fixed;width:3px;height:3px;background:rgba(212,201,168,0.3);border-radius:50%;pointer-events:none;z-index:1}
.dust:nth-child(1){top:15%;left:20%;animation:drift1 18s infinite linear}
.dust:nth-child(2){top:45%;left:70%;animation:drift2 22s infinite linear}
.dust:nth-child(3){top:70%;left:40%;animation:drift1 15s infinite linear reverse}
.dust:nth-child(4){top:25%;left:80%;animation:drift2 20s infinite linear reverse}
.dust:nth-child(5){top:60%;left:15%;animation:drift1 25s infinite linear}
@keyframes drift1{0%{transform:translate(0,0) scale(1);opacity:0.3}25%{opacity:0.6}50%{transform:translate(60px,-40px) scale(1.5);opacity:0.2}75%{opacity:0.5}100%{transform:translate(-20px,30px) scale(0.8);opacity:0.3}}
@keyframes drift2{0%{transform:translate(0,0);opacity:0.2}50%{transform:translate(-50px,60px);opacity:0.5}100%{transform:translate(30px,-20px);opacity:0.2}}

/* === LAYOUT === */
.page-wrap{max-width:900px;margin:0 auto;padding:40px 24px 60px;position:relative;z-index:2}
nav.side-nav{display:flex;gap:16px;margin-bottom:40px;flex-wrap:wrap}
nav.side-nav .nav-link{color:#665e4a;font-size:0.75rem;text-decoration:none;transition:color 0.3s}
nav.side-nav .nav-link:hover{color:#d4c9a8}
nav.side-nav .nav-link-active{color:#d4c9a8}
.top-header{margin-bottom:60px}
.top-header a{display:flex;align-items:center;gap:12px;text-decoration:none;color:#d4c9a8}
.top-header .logo-small{width:36px;height:36px;object-fit:contain;border-radius:50%;filter:sepia(0.3)}
.top-header .site-title{font-family:'Special Elite',serif;font-size:1.1rem;letter-spacing:0.05em}

/* === TAGLINE === */
.tagline{
  font-family:'Special Elite',serif;
  font-size:1.8rem;
  color:#d4c9a8;
  text-align:center;
  margin-bottom:56px;
  line-height:1.4;
  text-shadow:0 2px 8px rgba(0,0,0,0.5);
}
.tagline .no{color:#8b4049;text-decoration:line-through;text-decoration-thickness:2px}
.tagline .yes{color:#c9a84d;font-style:italic}

/* === THE MACHINE === */
.machine{
  position:relative;
  background:linear-gradient(170deg,#2a2318 0%,#1e1a12 40%,#15120d 100%);
  border:3px solid #3d3528;
  border-radius:12px;
  padding:40px 32px 36px;
  margin:0 auto 48px;
  max-width:680px;
  box-shadow:
    0 20px 60px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.03),
    inset 0 -2px 0 rgba(0,0,0,0.3),
    0 0 0 1px rgba(0,0,0,0.4);
  /* scratched metal look */
  background-image:
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,0.008) 40px,rgba(255,255,255,0.008) 41px),
    repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(255,255,255,0.005) 60px,rgba(255,255,255,0.005) 61px);
}
.machine::before{
  content:'SLOTMUSIC';
  position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  font-family:'Special Elite',serif;font-size:0.7rem;letter-spacing:0.4em;
  color:#665e4a;background:#1a1611;padding:0 16px;
  text-transform:uppercase;
}
/* Worn sticker */
.machine::after{
  content:'Mk.I';position:absolute;bottom:8px;right:16px;
  font-family:'Special Elite',serif;font-size:0.6rem;color:#3d3528;
  transform:rotate(-3deg);
}

/* === REELS === */
.reels{display:flex;gap:12px;justify-content:center;margin-bottom:28px;padding-right:60px}
.reel-col{flex:1;max-width:160px;text-align:center}
.reel-label{
  font-family:'Special Elite',serif;font-size:0.65rem;
  text-transform:uppercase;letter-spacing:0.2em;
  color:#665e4a;margin-bottom:8px;
}
.reel-window{
  background:#0d0b08;
  border:2px solid #3d3528;
  border-radius:6px;
  height:64px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 4px 12px rgba(0,0,0,0.8),inset 0 -2px 4px rgba(0,0,0,0.4);
  overflow:hidden;
  position:relative;
}
.reel-window::before,.reel-window::after{
  content:'';position:absolute;left:0;right:0;height:12px;z-index:2;
}
.reel-window::before{top:0;background:linear-gradient(to bottom,#0d0b08,transparent)}
.reel-window::after{bottom:0;background:linear-gradient(to top,#0d0b08,transparent)}
.reel-val{
  font-family:'Special Elite',serif;
  font-size:1.05rem;
  color:#c9a84d;
  text-shadow:0 0 8px rgba(201,168,77,0.4);
  transition:none;
  position:relative;z-index:1;
}
.reel-window.spin .reel-val{animation:reelBlur 0.15s infinite;color:#888060}
.reel-window.land .reel-val{animation:reelLand 0.3s ease-out;color:#c9a84d}
@keyframes reelBlur{0%{transform:translateY(-8px);opacity:0.4}50%{transform:translateY(0);opacity:0.8}100%{transform:translateY(8px);opacity:0.4}}
@keyframes reelLand{0%{transform:translateY(-6px)}60%{transform:translateY(2px)}100%{transform:translateY(0)}}

/* === LEVER === */
.lever-track{
  position:absolute;
  right:20px;
  top:40px;
  bottom:36px;
  width:36px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.lever-slot{
  width:8px;
  flex:1;
  background:#0d0b08;
  border:1px solid #3d3528;
  border-radius:4px;
  position:relative;
  box-shadow:inset 0 2px 6px rgba(0,0,0,0.8);
}
.lever-handle{
  width:32px;height:32px;
  background:radial-gradient(circle at 40% 35%,#8b7355,#5a4a35 60%,#3d3020);
  border:2px solid #5a4a35;
  border-radius:50%;
  cursor:grab;
  position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  box-shadow:0 2px 8px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.1);
  transition:top 0.15s ease-in;
  z-index:3;
}
.lever-handle:hover{box-shadow:0 2px 12px rgba(201,168,77,0.3),inset 0 1px 0 rgba(255,255,255,0.1);border-color:#c9a84d}
.lever-handle:active{cursor:grabbing}
.lever-handle.pulled{top:calc(100% - 32px);transition:top 0.3s ease-in}
.lever-handle.released{top:0;transition:top 0.5s cubic-bezier(0.175,0.885,0.32,1.275)}
.lever-base{
  width:16px;height:12px;
  background:#3d3528;border-radius:0 0 6px 6px;
  margin-top:-1px;
}

/* === SONG RESULT === */
.result{
  max-width:680px;margin:0 auto 48px;
  opacity:0;transform:translateY(20px) scale(0.97);
  transition:opacity 0.5s ease,transform 0.5s ease;
  pointer-events:none;
}
.result.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.result-card{
  background:linear-gradient(145deg,#252015,#1e1a12);
  border:1px solid #3d3528;
  border-radius:8px;
  padding:32px;
  display:flex;gap:24px;align-items:center;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.result-art{
  width:120px;height:120px;min-width:120px;
  border-radius:6px;overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,0.5);
  position:relative;
}
.result-art-bg{width:100%;height:100%;position:relative}
/* Vinyl grooves overlay */
.result-art::after{
  content:'';position:absolute;top:50%;left:50%;
  width:80px;height:80px;border-radius:50%;
  transform:translate(-50%,-50%);
  border:1px solid rgba(255,255,255,0.06);
  box-shadow:0 0 0 8px rgba(255,255,255,0.03),0 0 0 16px rgba(255,255,255,0.02),0 0 0 24px rgba(255,255,255,0.01);
}
.result-info{flex:1;min-width:0}
.result-song{font-family:'Special Elite',serif;font-size:1.3rem;color:#d4c9a8;margin-bottom:4px;line-height:1.3}
.result-artist{font-size:0.9rem;color:#8b8060;margin-bottom:2px}
.result-album{font-size:0.8rem;color:#665e4a;font-style:italic;margin-bottom:16px}
.result-links{display:flex;gap:12px;flex-wrap:wrap}
.result-links a{
  display:inline-flex;align-items:center;gap:6px;
  font-size:0.75rem;color:#8b8060;text-decoration:none;
  padding:6px 14px;border:1px solid #3d3528;border-radius:20px;
  transition:all 0.2s;
}
.result-links a:hover{color:#c9a84d;border-color:#665e4a;background:rgba(201,168,77,0.05)}
.result-links svg{width:14px;height:14px;fill:currentColor}
.result-again{text-align:center;margin-top:16px}
.result-again button{
  background:none;border:1px dashed #3d3528;color:#665e4a;
  font-family:'Special Elite',serif;font-size:0.8rem;
  padding:8px 20px;border-radius:20px;cursor:pointer;
  transition:all 0.2s;
}
.result-again button:hover{color:#c9a84d;border-color:#665e4a}

/* === COLLECTION === */
.collection{max-width:680px;margin:0 auto 60px}
.coll-toggle{
  background:none;border:none;color:#665e4a;
  font-family:'Special Elite',serif;font-size:0.85rem;
  cursor:pointer;padding:8px 0;width:100%;text-align:left;
  transition:color 0.2s;
}
.coll-toggle:hover{color:#d4c9a8}
.coll-toggle .arr{display:inline-block;transition:transform 0.3s;margin-right:8px;font-size:0.7rem}
.coll-toggle.open .arr{transform:rotate(90deg)}
.coll-body{max-height:0;overflow:hidden;transition:max-height 0.5s ease}
.coll-body.open{max-height:8000px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin:16px 0}
.pill{
  background:none;border:1px solid #3d3528;color:#665e4a;
  font-size:0.7rem;padding:4px 12px;border-radius:12px;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all 0.2s;
}
.pill:hover,.pill.on{color:#c9a84d;border-color:#665e4a}
.coll-item{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:8px 0;border-bottom:1px solid #1e1a12;font-size:0.8rem;
}
.coll-item-song{color:#8b8060}
.coll-item-artist{color:#665e4a;font-size:0.75rem;text-align:right;min-width:100px}

/* === FOOTER === */
.page-footer{
  text-align:center;padding-top:24px;
  border-top:1px solid #252015;max-width:680px;margin:0 auto;
}
.page-footer p{font-size:0.7rem;color:#3d3528;margin-bottom:4px}
.page-footer p:first-child{font-family:'Special Elite',serif;font-size:0.8rem;color:#665e4a}

/* === MOBILE === */
@media(max-width:600px){
  .tagline{font-size:1.3rem}
  .machine{padding:32px 20px 28px}
  .reels{flex-direction:column;align-items:center;gap:8px;padding-right:50px}
  .reel-col{max-width:200px;width:100%}
  .reel-window{height:52px}
  .reel-val{font-size:0.9rem}
  .lever-track{right:10px;width:30px}
  .lever-handle{width:26px;height:26px}
  .result-card{flex-direction:column;text-align:center;padding:24px}
  .result-art{width:100px;height:100px;min-width:100px}
  .result-links{justify-content:center}
}
</style>

  var V=["Chill","Groove","Fire"];
  var R=["Jazz","Brazilian","Electronic","Soul & Funk","Hip Hop","Latin","Rock & Alt"];
  var T=["Melodic","Rhythmic","Atmospheric"];
  var GC={
    "Jazz":"#1a3a4e,#0a2030,#4ecdc4",
    "Brazilian":"#3a2e0a,#1a2e0a,#e6b422",
    "Electronic":"#1a0a3e,#0a1a2e,#7b6fff",
    "Soul & Funk":"#3e1a0a,#2e1a0a,#ff8c42",
    "Hip Hop":"#2e0a2e,#1a0a1a,#ff4d6d",
    "Latin":"#3e2a0a,#2e0a0a,#ff6b35",
    "Rock & Alt":"#1a1a2e,#0a0a1a,#8888aa"
  };

  var lever=document.getElementById("lever");
  var r1=document.getElementById("r1");
  var r2=document.getElementById("r2");
  var r3=document.getElementById("r3");
  var result=document.getElementById("result");
  var again=document.getElementById("again");
  var ctog=document.getElementById("ctog");
  var cbody=document.getElementById("cbody");
  var busy=false;

  function spin(){
    if(busy)return;
    busy=true;
    result.classList.remove("show");

    // Animate lever
    lever.classList.remove("released");
    lever.classList.add("pulled");

    // Start spinning reels
    r1.classList.add("spin");r1.classList.remove("land");
    r2.classList.add("spin");r2.classList.remove("land");
    r3.classList.add("spin");r3.classList.remove("land");

    // Cycle text in reels
    var i1=setInterval(function(){r1.querySelector(".reel-val").textContent=V[Math.floor(Math.random()*V.length)]},80);
    var i2=setInterval(function(){r2.querySelector(".reel-val").textContent=R[Math.floor(Math.random()*R.length)]},90);
    var i3=setInterval(function(){r3.querySelector(".reel-val").textContent=T[Math.floor(Math.random()*T.length)]},100);

    // Pick final values
    var fv=V[Math.floor(Math.random()*V.length)];
    var fr=R[Math.floor(Math.random()*R.length)];
    var ft=T[Math.floor(Math.random()*T.length)];

    // Release lever
    setTimeout(function(){lever.classList.remove("pulled");lever.classList.add("released")},600);

    // Stop reel 1
    setTimeout(function(){
      clearInterval(i1);r1.classList.remove("spin");r1.classList.add("land");
      r1.querySelector(".reel-val").textContent=fv;
    },1400);
    // Stop reel 2
    setTimeout(function(){
      clearInterval(i2);r2.classList.remove("spin");r2.classList.add("land");
      r2.querySelector(".reel-val").textContent=fr;
    },2000);
    // Stop reel 3
    setTimeout(function(){
      clearInterval(i3);r3.classList.remove("spin");r3.classList.add("land");
      r3.querySelector(".reel-val").textContent=ft;
    },2600);
    // Reveal song
    setTimeout(function(){
      var song=find(fv,fr,ft);
      show(song);
      busy=false;
    },3000);
  }

  function find(v,r,t){
    var m=S.filter(function(x){return x.v===v&&x.r===r&&x.t===t});
    if(m.length)return m[Math.floor(Math.random()*m.length)];
    m=S.filter(function(x){return x.v===v&&x.r===r});
    if(m.length)return m[Math.floor(Math.random()*m.length)];
    m=S.filter(function(x){return x.v===v});
    if(m.length)return m[Math.floor(Math.random()*m.length)];
    return S[Math.floor(Math.random()*S.length)];
  }

  function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}
  function enc(s){return encodeURIComponent(s)}

  function show(song){
    document.getElementById("rs").textContent=song.s;
    document.getElementById("ra").textContent=song.ar;
    document.getElementById("ral").textContent=song.al;

    // Album art
    var gc=(GC[song.r]||"#1a1a2e,#0a0a1a,#888").split(",");
    var ang=Math.floor(Math.random()*360);
    document.getElementById("art").style.background="linear-gradient("+ang+"deg,"+gc[0]+","+gc[1]+")";

    // Links
    var q=enc(song.ar+" "+song.s);
    var rl=document.getElementById("rl");
    rl.innerHTML='<a href="https://open.spotify.com/search/'+q+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg> Spotify</a>'
    +'<a href="https://www.youtube.com/results?search_query='+q+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg> YouTube</a>'
    +'<a href="https://music.apple.com/us/search?term='+q+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M23.994 18.066a8.4 8.4 0 01-.925 2.03c-.56.82-1.02 1.39-1.37 1.71-.55.52-1.14.79-1.77.8-.45 0-1-.13-1.64-.39-.64-.26-1.22-.39-1.76-.39-.56 0-1.16.13-1.8.39-.64.26-1.16.4-1.56.4-.6.02-1.2-.16-1.8-.55a12.3 12.3 0 01-1.95-2.16 14 14 0 01-1.3-2.22 12.7 12.7 0 01-.86-3.09c0-1.14.25-2.12.74-2.95a4.3 4.3 0 013.64-2.17c.48 0 1.11.15 1.9.45.78.3 1.28.45 1.5.45.16 0 .72-.18 1.67-.52.9-.32 1.65-.46 2.27-.4 1.68.13 2.94.8 3.78 1.99-1.5.91-2.24 2.19-2.23 3.82.01 1.27.47 2.33 1.38 3.17.41.39.87.69 1.38.9-.11.32-.23.63-.35.93zM18.09.3c0 1-.36 1.93-1.09 2.78-.87 1.02-1.93 1.61-3.07 1.52a3 3 0 01-.02-.38c0-.96.42-1.98 1.16-2.82A4.5 4.5 0 0118.07 0c.01.1.02.2.02.3z"/></svg> Apple</a>';

    result.classList.add("show");
  }

  // Bind events
  lever.addEventListener("click",spin);
  lever.addEventListener("touchend",function(e){e.preventDefault();spin()});
  again.addEventListener("click",spin);

  // Collection
  var built=false;
  ctog.addEventListener("click",function(){
    var open=cbody.classList.contains("open");
    if(open){
      cbody.classList.remove("open");
      ctog.classList.remove("open");
    }else{
      cbody.classList.add("open");
      ctog.classList.add("open");
      if(!built){buildColl();built=true}
    }
  });

  function buildColl(){
    var pills=document.getElementById("pills");
    var all=["All"].concat(R);
    all.forEach(function(g){
      var b=document.createElement("button");
      b.className="pill"+(g==="All"?" on":"");
      b.textContent=g;
      b.addEventListener("click",function(){
        var ps=pills.querySelectorAll(".pill");
        for(var i=0;i<ps.length;i++)ps[i].classList.remove("on");
        b.classList.add("on");
        renderColl(g==="All"?null:g);
      });
      pills.appendChild(b);
    });
    renderColl(null);
  }

  function renderColl(filter){
    var list=document.getElementById("clist");
    list.innerHTML="";
    var sorted=S.slice().sort(function(a,b){return a.ar.localeCompare(b.ar)});
    if(filter)sorted=sorted.filter(function(x){return x.r===filter});
    sorted.forEach(function(x){
      var d=document.createElement("div");
      d.className="coll-item";
      d.innerHTML='<span class="coll-item-song">'+esc(x.s)+'</span><span class="coll-item-artist">'+esc(x.ar)+'</span>';
      list.appendChild(d);
    });
  }

})();
</script>
